<!DOCTYPE html>
<html>

<head>

<title>Contact</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="/static/script.js"></script>

</head>


<body class="bg-gray-100">


<!-- NAVBAR -->

<nav class="bg-slate-900 text-white px-8 py-4 flex justify-between items-center shadow">

<h1 class="text-xl font-semibold">
Student Portal
</h1>

<div class="space-x-6 text-sm">

<a href="/" class="hover:text-sky-400 transition">Home</a>
<a href="/services" class="hover:text-sky-400 transition">Services</a>
<a href="/about" class="hover:text-sky-400 transition">About</a>
<a href="/contact" class="text-sky-400">Contact</a>

</div>

</nav>



<!-- HERO -->

<section class="bg-gradient-to-r from-slate-900 to-slate-700 text-white py-20 text-center">

<h1 class="text-4xl font-semibold mb-4">
Contact Student Services
</h1>

<p class="text-gray-300">
Submit a request and our support team will assist you.
</p>

</section>



<!-- FORM -->

<div class="flex justify-center items-center py-20 px-6">

<div class="bg-white p-10 rounded-xl shadow-xl w-full max-w-lg">


<h2 class="text-2xl font-semibold mb-6 text-center">

Send a Support Request

</h2>


<!-- SUCCESS MESSAGE -->

<div id="successMessage"
class="hidden bg-green-100 text-green-700 p-3 rounded mb-4 text-center">

Request submitted successfully.

</div>


<!-- NAME -->

<label class="text-sm text-gray-600">
Name
</label>

<input
id="name"
placeholder="Enter your name"
class="w-full border border-gray-300 p-3 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-sky-400"
/>



<!-- EMAIL -->

<label class="text-sm text-gray-600">
Email
</label>

<input
id="email"
placeholder="Enter your email"
class="w-full border border-gray-300 p-3 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-sky-400"
/>



<!-- MESSAGE -->

<label class="text-sm text-gray-600">
Message
</label>

<textarea
id="message"
rows="4"
placeholder="Describe your issue"
class="w-full border border-gray-300 p-3 rounded mb-6 focus:outline-none focus:ring-2 focus:ring-sky-400"></textarea>



<!-- BUTTON -->

<button
onclick="submitContact()"
class="w-full bg-sky-500 text-white py-3 rounded-lg hover:bg-sky-600 transition">

Submit Request

</button>

</div>

</div>


<!-- FOOTER -->

<footer class="text-center text-gray-500 py-10">

© 2026 Student Service Portal

</footer>


</body>
</html>
